        </section>
        <div class="container">
            <!-- MAPA -->
            <div class="map-section">
                <div class="map-row">
                    <div class="map-container"><div id="map"></div></div>
                    <div class="map-controls">
                        <h4><i class="fas fa-plus-circle"></i> Registrar Observación</h4>
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Especie</label>
                            <select id="speciesSelect" style="width:100%;"></select>
                        </div>
