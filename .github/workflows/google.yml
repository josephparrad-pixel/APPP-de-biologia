                            <label><i class="fas fa-map-pin"></i> Ubicación (automática)</label>
                            <input type="text" id="coordsInput" placeholder="Lat, Lng" readonly />
                        </div>
                        <button class="btn btn-success" id="addObservationBtn"><i class="fas fa-save"></i> Registrar observación</button>
                        <div style="margin-top:1rem;"><button class="btn btn-outline" id="clearObservationsBtn"><i class="fas fa-trash-alt"></i> Limpiar todo</button></div>
                        <div class="observation-list" id="observationList">
                            <div style="text-align:center;color:#6a8a8a;padding:0.5rem;">No hay observaciones aún</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ENM -->
            <div class="enm-section">
                <h3><i class="fas fa-chart-line"></i> Modelaje de Nichos Ecológicos (ENM)</h3>
                <p style="margin-bottom:1rem;color:#4a6a7a;">Ajusta las variables ambientales y observa cómo cambia la idoneidad del hábitat para la especie seleccionada.</p>

                <div class="enm-row">
                    <div class="enm-controls">
                        <div class="form-group">
                            <label for="enmSpecies">Especie objetivo <span id="enmSpeciesName">Oso de anteojos</span></label>
                            <select id="enmSpecies" style="width:100%;"></select>
                        </div>

                        <div class="form-group">
                            <label>Temperatura media anual <span id="tempVal">15</span>°C</label>
                            <input type="range" id="tempSlider" min="5" max="30" value="15" step="0.5">
                            <div class="variable-desc">Rango óptimo: 10-20°C</div>
                        </div>

                        <div class="form-group">
                            <label>Precipitación anual <span id="precVal">1500</span> mm</label>
                            <input type="range" id="precSlider" min="300" max="4000" value="1500" step="50">
                            <div class="variable-desc">Rango óptimo: 1000-2500 mm</div>
                        </div>

                        <div class="form-group">
                            <label>Altitud <span id="altVal">2500</span> m</label>
                            <input type="range" id="altSlider" min="0" max="5000" value="2500" step="50">
                            <div class="variable-desc">Rango óptimo: 1500-3500 m</div>
                        </div>

                        <div class="form-group">
                            <label>Perturbación humana <span id="disturbVal">30</span> %</label>
                            <input type="range" id="disturbSlider" min="0" max="100" value="30" step="1">
                            <div class="variable-desc">Menor perturbación = mayor idoneidad</div>
                        </div>

                        <div class="form-group">
                            <label>Cobertura vegetal (NDVI) <span id="ndviVal">0.70</span></label>
                            <input type="range" id="ndviSlider" min="0" max="1" value="0.70" step="0.01">
                            <div class="variable-desc">Valores altos indican vegetación densa</div>
                        </div>
                    </div>

                    <div class="enm-graph">
                        <canvas id="enmChart" style="max-height:250px; width:100%;"></canvas>
                        <div class="enm-stats">
                            <div><strong>Idoneidad total:</strong> <span id="suitabilityValue">78%</span></div>
                            <div><strong>Área potencial:</strong> <span id="potentialArea">42,500</span> km²</div>
                            <div><strong>Variable clave:</strong> <span id="keyVar">Temperatura</span></div>
                        </div>
                    </div>
                </div>

                <div class="enm-description">
                    <h4><i class="fas fa-info-circle"></i> Descripción de las variables ambientales</h4>
                    <p>Estas variables influyen directamente en la distribución potencial de las especies. El modelo calcula una <strong>idoneidad del hábitat</strong> (0-100%) combinando las respuestas de cada variable. Los rangos óptimos se basan en la literatura ecológica para la especie seleccionada.</p>
                    <ul>
                        <li><strong>Temperatura media anual (°C):</strong> Afecta la fisiología y metabolismo. Especies de alta montaña como el Oso de anteojos prefieren climas templados-fríos.</li>
                        <li><strong>Precipitación anual (mm):</strong> Determina la disponibilidad de agua y humedad. Especies amazónicas requieren alta pluviosidad.</li>
                        <li><strong>Altitud (m):</strong> Influye en la presión atmosférica, temperatura y vegetación. Cada especie tiene un rango altitudinal característico.</li>
                        <li><strong>Perturbación humana (%):</strong> Mide el impacto antropogénico (urbanización, agricultura). A mayor perturbación, menor idoneidad para la vida silvestre.</li>
                        <li><strong>Cobertura vegetal (NDVI):</strong> Índice de vegetación. Valores altos indican bosques saludables, clave para especies forestales.</li>
                    </ul>
                    <p style="margin-top:0.5rem;"><i class="fas fa-cog"></i> El gráfico muestra la <strong>curva de respuesta</strong> de la variable clave (la más restrictiva) a lo largo de su rango, indicando cómo varía la idoneidad.</p>
                </div>
            </div>
        </div>
        <footer class="footer"><p><i class="fas fa-map-pin"></i> Simulador de monitoreo y nichos ecológicos</p></footer>
