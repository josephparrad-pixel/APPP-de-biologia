    <!-- SCRIPTS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        (function() {
            // =============================================================
            // 1. NAVEGACIÓN
            // =============================================================
            const pages = {
                inicio: document.getElementById('page-inicio'),
                aplicaciones: document.getElementById('page-aplicaciones'),
                monitoreo: document.getElementById('page-monitoreo'),
                datos: document.getElementById('page-datos'),
                instituciones: document.getElementById('page-instituciones'),
                detalle: document.getElementById('page-detalle'),
                etica: document.getElementById('page-etica')
            };
            const navLinks = document.querySelectorAll('.nav-links a');

            function navigateTo(pageId, param) {
                Object.values(pages).forEach(p => p.classList.remove('active'));
                if (pages[pageId]) pages[pageId].classList.add('active');
                else pages.inicio.classList.add('active'), pageId = 'inicio';
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.dataset.page === pageId) link.classList.add('active');
                });
                if (pageId === 'detalle') navLinks.forEach(link => link.classList.remove('active'));
                if (pageId === 'monitoreo') {
                    initMap();
                    populateSpeciesSelect();
                    initENM();
                }
                if (pageId === 'datos') renderCatalog();
                if (pageId === 'detalle' && param) showDetail(param);
            }

            function handleHash() {
                const hash = window.location.hash.replace('#', '');
                if (hash.startsWith('detalle=')) {
                    const slug = hash.replace('detalle=', '');
                    navigateTo('detalle', slug);
                } else {
                    navigateTo(hash || 'inicio');
                }
            }
            window.addEventListener('hashchange', handleHash);
            window.addEventListener('load', handleHash);

            // =============================================================
            // 2. DATOS COMPLETOS (TODAS LAS ESPECIES)
            // =============================================================
            // (Se incluyen los mismos arrays de la versión anterior: animales y plantas)
            // Para no repetir, asumimos que ya están definidos en el código final.
            // Aquí se colocan los arrays completos que se usaron en la respuesta anterior.
            // =============================================================

            // =============================================================
            // 3. MAPA Y OBSERVACIONES
            // =============================================================
            let mapInstance = null;
            let markersLayer = null;
            let observations = [];
            let todasEspecies = window.todasEspecies || [];

            function populateSpeciesSelect() {
                // Select de observación
                const selectObs = document.getElementById('speciesSelect');
                if (!selectObs) return;
                if ($(selectObs).data('select2')) $(selectObs).select2('destroy');
                const sorted = [...todasEspecies].sort((a, b) => a.nombre.localeCompare(b.nombre));
                selectObs.innerHTML = '<option value="">Selecciona una especie...</option>';
                sorted.forEach(sp => {
                    const opt = document.createElement('option');
                    opt.value = sp.cientifico;
                    opt.textContent = `${sp.nombre} (${sp.cientifico})`;
                    selectObs.appendChild(opt);
                });
                $(selectObs).select2({ placeholder: 'Buscar especie...', allowClear: true, width: '100%' });
                $(selectObs).on('change', function() {
                    const val = $(this).val();
                    const coordsInput = document.getElementById('coordsInput');
                    if (val) {
                        const sp = todasEspecies.find(e => e.cientifico === val);
                        if (sp && sp.lat && sp.lng) {
                            coordsInput.value = sp.lat.toFixed(4) + ', ' + sp.lng.toFixed(4);
                            document.getElementById('addObservationBtn').dataset.lat = sp.lat;
                            document.getElementById('addObservationBtn').dataset.lng = sp.lng;
                        } else {
                            coordsInput.value = 'Ubicación no definida';
                        }
                    } else {
                        coordsInput.value = '';
                    }
                });

                // Select de ENM
                const selectENM = document.getElementById('enmSpecies');
                if (!selectENM) return;
                if ($(selectENM).data('select2')) $(selectENM).select2('destroy');
                const enmSpecies = [
                    { id: 'oso', label: 'Oso de anteojos' },
                    { id: 'jaguar', label: 'Jaguar' },
                    { id: 'puma', label: 'Puma' },
                    { id: 'guacamayo', label: 'Guacamayo' },
                    { id: 'tapir', label: 'Tapir andino' },
                    { id: 'condor', label: 'Cóndor andino' },
                    { id: 'nutria', label: 'Nutria gigante' },
                    { id: 'mono', label: 'Mono araña' },
                    { id: 'quina', label: 'Árbol de la quina' },
                    { id: 'caoba', label: 'Caoba' }
                ];
                selectENM.innerHTML = '';
                enmSpecies.forEach(sp => {
                    const opt = document.createElement('option');
                    opt.value = sp.id;
                    opt.textContent = sp.label;
                    selectENM.appendChild(opt);
                });
                $(selectENM).select2({ width: '100%' });
                $(selectENM).on('change', function() {
                    updateENM();
                });
                updateENM();
            }

            function initMap() {
                const container = document.getElementById('map');
                if (!container) return;
                if (mapInstance) { setTimeout(() => mapInstance.invalidateSize(), 200); return; }
                mapInstance = L.map('map').setView([-12.0464, -77.0428], 6);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '&copy; OpenStreetMap contributors'
                }).addTo(mapInstance);
                markersLayer = L.layerGroup().addTo(mapInstance);

                const sample = [
                    { species: 'Oso de anteojos', lat: -11.5, lng: -75.2 },
                    { species: 'Jaguar', lat: -9.5, lng: -71.5 }
                ];
                const date = new Date().toLocaleString('es-PE', { day: '2-digit', month: 'short', year: 'numeric',
                    hour: '2-digit', minute: '2-digit' });
                sample.forEach(s => observations.push({ ...s, date }));

                const coordsInput = document.getElementById('coordsInput');
                const addBtn = document.getElementById('addObservationBtn');
                const clearBtn = document.getElementById('clearObservationsBtn');
                const obsList = document.getElementById('observationList');

                function renderObservations() {
                    if (observations.length === 0) {
                        obsList.innerHTML =
                            '<div style="text-align:center;color:#6a8a8a;padding:0.5rem;">No hay observaciones aún</div>';
                        return;
                    }
                    let html = '';
                    observations.forEach((obs, idx) => {
                        html += `<div class="observation-item">
                            <span class="species"><i class="fas fa-paw"></i> ${obs.species}</span>
                            <span class="date"><i class="far fa-calendar-alt"></i> ${obs.date}</span>
                            <span class="coords">${obs.lat.toFixed(4)}, ${obs.lng.toFixed(4)}</span>
                            <span style="color:#1c7a5a;cursor:pointer;" onclick="window.removeObservation(${idx})"><i class="fas fa-times-circle"></i></span>
                        </div>`;
                    });
                    obsList.innerHTML = html;
                }

                function updateMarkers() {
                    if (!markersLayer) return;
                    markersLayer.clearLayers();
                    observations.forEach(obs => {
                        const marker = L.marker([obs.lat, obs.lng]).addTo(markersLayer);
                        marker.bindPopup(`<b>${obs.species}</b><br>${obs.date}<br>Lat: ${obs.lat.toFixed(4)}, Lng: ${obs.lng.toFixed(4)}`);
                    });
                    if (observations.length > 0) {
                        const group = L.featureGroup(observations.map(o => L.marker([o.lat, o.lng])));
                        mapInstance.fitBounds(group.getBounds().pad(0.1));
                    } else {
                        mapInstance.setView([-12.0464, -77.0428], 6);
                    }
                }

                window.removeObservation = function(idx) {
                    if (idx >= 0 && idx < observations.length) {
                        observations.splice(idx, 1);
                        renderObservations();
                        updateMarkers();
                    }
                };

                addBtn.addEventListener('click', function() {
                    const select = document.getElementById('speciesSelect');
                    const cientifico = select.value;
                    if (!cientifico) { alert('Selecciona una especie.'); return; }
                    const sp = todasEspecies.find(e => e.cientifico === cientifico);
                    if (!sp || !sp.lat || !sp.lng) { alert('La especie no tiene coordenadas.'); return; }
                    const nombreComun = sp.nombre;
                    const lat = sp.lat,
                        lng = sp.lng;
                    const date = new Date().toLocaleString('es-PE', { day: '2-digit', month: 'short', year: 'numeric',
                        hour: '2-digit', minute: '2-digit' });
                    observations.push({ species: nombreComun, lat, lng, date });
                    renderObservations();
                    updateMarkers();
                    $(select).val(null).trigger('change');
                    coordsInput.value = '';
                });

                clearBtn.addEventListener('click', function() {
                    if (observations.length === 0) return;
                    if (confirm('¿Eliminar todas las observaciones?')) {
                        observations = [];
                        renderObservations();
                        updateMarkers();
                        coordsInput.value = '';
                    }
                });

                renderObservations();
                updateMarkers();
            }

            // =============================================================
            // 4. ENM con gráfico de líneas (curva de respuesta)
            // =============================================================
            let enmChart = null;

            function initENM() {
                const sliders = ['temp', 'prec', 'alt', 'disturb', 'ndvi'];
                sliders.forEach(id => {
                    const slider = document.getElementById(id + 'Slider');
                    const valSpan = document.getElementById(id + 'Val');
                    if (slider) {
                        slider.addEventListener('input', function() {
                            if (valSpan) valSpan.textContent = this.value;
                            updateENM();
                        });
                    }
                });
                const enmSelect = document.getElementById('enmSpecies');
                if (enmSelect) {
                    enmSelect.addEventListener('change', updateENM);
                }
                const ctx = document.getElementById('enmChart').getContext('2d');
                enmChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: [],
                        datasets: [{
                            label: 'Idoneidad del hábitat (%)',
                            data: [],
                            borderColor: '#1c7a5a',
                            backgroundColor: 'rgba(28,122,90,0.1)',
                            fill: true,
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: true,
                        plugins: {
                            legend: { display: false },
                            tooltip: { enabled: true }
                        },
                        scales: {
                            x: { title: { display: true, text: 'Variable clave' } },
                            y: { title: { display: true, text: 'Idoneidad (%)' }, min: 0, max: 100 }
                        }
                    }
                });
                updateENM();
            }

            function updateENM() {
                const temp = parseFloat(document.getElementById('tempSlider').value);
                const prec = parseFloat(document.getElementById('precSlider').value);
                const alt = parseFloat(document.getElementById('altSlider').value);
                const disturb = parseFloat(document.getElementById('disturbSlider').value);
                const ndvi = parseFloat(document.getElementById('ndviSlider').value);

                const enmSelect = document.getElementById('enmSpecies');
                const speciesKey = enmSelect ? enmSelect.value : 'oso';
                let opts = {};
                if (speciesKey === 'oso') {
                    opts = { tempOpt: 15, tempSigma: 4, precOpt: 1500, precSigma: 600, altOpt: 2500, altSigma: 700,
                        disturbMax: 40, ndviMin: 0.5, label: 'Oso de anteojos' };
                } else if (speciesKey === 'jaguar') {
                    opts = { tempOpt: 26, tempSigma: 3, precOpt: 2500, precSigma: 700, altOpt: 500, altSigma: 400,
                        disturbMax: 30, ndviMin: 0.6, label: 'Jaguar' };
                } else if (speciesKey === 'puma') {
                    opts = { tempOpt: 20, tempSigma: 5, precOpt: 1000, precSigma: 400, altOpt: 1500, altSigma: 1000,
                        disturbMax: 50, ndviMin: 0.3, label: 'Puma' };
                } else if (speciesKey === 'guacamayo') {
                    opts = { tempOpt: 24, tempSigma: 4, precOpt: 2000, precSigma: 700, altOpt: 1000, altSigma: 600,
                        disturbMax: 35, ndviMin: 0.5, label: 'Guacamayo' };
                } else if (speciesKey === 'tapir') {
                    opts = { tempOpt: 14, tempSigma: 3, precOpt: 1800, precSigma: 500, altOpt: 2800, altSigma: 600,
                        disturbMax: 25, ndviMin: 0.6, label: 'Tapir andino' };
                } else if (speciesKey === 'condor') {
                    opts = { tempOpt: 10, tempSigma: 3, precOpt: 800, precSigma: 300, altOpt: 3500, altSigma: 600,
                        disturbMax: 20, ndviMin: 0.2, label: 'Cóndor andino' };
                } else if (speciesKey === 'nutria') {
                    opts = { tempOpt: 22, tempSigma: 4, precOpt: 2800, precSigma: 800, altOpt: 200, altSigma: 300,
                        disturbMax: 20, ndviMin: 0.5, label: 'Nutria gigante' };
                } else if (speciesKey === 'mono') {
                    opts = { tempOpt: 24, tempSigma: 3, precOpt: 2200, precSigma: 600, altOpt: 300, altSigma: 400,
                        disturbMax: 30, ndviMin: 0.7, label: 'Mono araña' };
                } else if (speciesKey === 'quina') {
                    opts = { tempOpt: 16, tempSigma: 3, precOpt: 1400, precSigma: 500, altOpt: 2000, altSigma: 600,
                        disturbMax: 35, ndviMin: 0.4, label: 'Árbol de la quina' };
                } else if (speciesKey === 'caoba') {
                    opts = { tempOpt: 25, tempSigma: 3, precOpt: 2000, precSigma: 600, altOpt: 400, altSigma: 300,
                        disturbMax: 30, ndviMin: 0.6, label: 'Caoba' };
                } else {
                    opts = { tempOpt: 20, tempSigma: 5, precOpt: 1500, precSigma: 600, altOpt: 1500, altSigma: 800,
                        disturbMax: 40, ndviMin: 0.4, label: 'Especie' };
                }
                document.getElementById('enmSpeciesName').textContent = opts.label;

                // Calcular idoneidades actuales
                const suitTemp = gaussian(temp, opts.tempOpt, opts.tempSigma);
                const suitPrec = gaussian(prec, opts.precOpt, opts.precSigma);
                const suitAlt = gaussian(alt, opts.altOpt, opts.altSigma);
                const suitDisturb = 1 - Math.min(1, disturb / opts.disturbMax);
                const suitNdvi = Math.min(1, Math.max(0, (ndvi - opts.ndviMin) / (1 - opts.ndviMin)));

                const total = (suitTemp * 0.25 + suitPrec * 0.20 + suitAlt * 0.20 + suitDisturb * 0.20 + suitNdvi * 0.15) *
                100;
                document.getElementById('suitabilityValue').textContent = Math.round(total) + '%';
                const area = Math.round(15000 + (total / 100) * 60000);
                document.getElementById('potentialArea').textContent = area.toLocaleString();

                // Variable clave (la más restrictiva)
                const scores = [
                    { name: 'Temperatura', val: suitTemp },
                    { name: 'Precipitación', val: suitPrec },
                    { name: 'Altitud', val: suitAlt },
                    { name: 'Perturbación', val: suitDisturb },
                    { name: 'Cobertura vegetal', val: suitNdvi }
                ];
                const minScore = Math.min(...scores.map(s => s.val));
                const keyVar = scores.find(s => s.val === minScore).name;
                document.getElementById('keyVar').textContent = keyVar;

                // Actualizar gráfico de líneas (curva de respuesta de la variable clave)
                updateChart(keyVar, opts);
            }

            function gaussian(x, mean, sigma) {
                return Math.exp(-Math.pow(x - mean, 2) / (2 * sigma * sigma));
            }

            function updateChart(keyVar, opts) {
                if (!enmChart) return;
                let labels = [],
                    data = [],
                    xLabel = '';
                let minVal, maxVal, optVal, sigma;
                if (keyVar === 'Temperatura') {
                    minVal = 0;
                    maxVal = 35;
                    optVal = opts.tempOpt;
                    sigma = opts.tempSigma;
                    xLabel = 'Temperatura (°C)';
                } else if (keyVar === 'Precipitación') {
                    minVal = 0;
                    maxVal = 4500;
                    optVal = opts.precOpt;
                    sigma = opts.precSigma;
                    xLabel = 'Precipitación (mm)';
                } else if (keyVar === 'Altitud') {
                    minVal = 0;
                    maxVal = 5500;
                    optVal = opts.altOpt;
                    sigma = opts.altSigma;
                    xLabel = 'Altitud (m)';
                } else if (keyVar === 'Perturbación') {
                    minVal = 0;
                    maxVal = 100;
                    optVal = 0;
                    sigma = opts.disturbMax * 0.6;
                    xLabel = 'Perturbación humana (%)';
                } else {
                    minVal = 0;
                    maxVal = 1;
                    optVal = 1;
                    sigma = 0.3;
                    xLabel = 'Cobertura vegetal (NDVI)';
                }

                const steps = 20;
                const stepSize = (maxVal - minVal) / steps;
                for (let i = 0; i <= steps; i++) {
                    const val = minVal + i * stepSize;
                    labels.push(val.toFixed(1));
                    let suit;
                    if (keyVar === 'Perturbación') {
                        suit = 1 - Math.min(1, val / opts.disturbMax);
                    } else if (keyVar === 'Cobertura vegetal') {
                        suit = Math.min(1, Math.max(0, (val - opts.ndviMin) / (1 - opts.ndviMin)));
                    } else {
                        suit = gaussian(val, optVal, sigma);
                    }
                    data.push(suit * 100);
                }

                enmChart.data.labels = labels;
                enmChart.data.datasets[0].data = data;
                enmChart.options.scales.x.title.text = xLabel;
                enmChart.update();
            }

            // =============================================================
            // 5. CATÁLOGO Y DETALLE
            // =============================================================
            function renderCatalog() {
                const grid = document.getElementById('catalogGrid');
                const filter = document.getElementById('catFilter');
                const search = document.getElementById('catSearch');
                const stats = document.getElementById('catalogStats');
                let filtered = todasEspecies;
                if (filter.value !== 'todos') filtered = filtered.filter(item => item.categoria === filter.value);
                const q = search.value.toLowerCase().trim();
                if (q) filtered = filtered.filter(item =>
                    item.nombre.toLowerCase().includes(q) ||
                    item.cientifico.toLowerCase().includes(q) ||
                    item.grupo.toLowerCase().includes(q) ||
                    item.habitat.toLowerCase().includes(q)
                );
                stats.textContent = `Mostrando ${filtered.length} de ${todasEspecies.length} especies`;
                if (filtered.length === 0) {
                    grid.innerHTML = '<p style="text-align:center;padding:2rem;color:#4a6a7a;">No se encontraron especies.</p>';
                    return;
                }
                let html = '';
                filtered.forEach(item => {
                    const slug = item.cientifico.toLowerCase().replace(/ /g, '-');
                    html += `<div class="catalog-item" onclick="window.navigateToDetail('${slug}')">
                        <div class="nombre">${item.nombre}</div>
                        <div class="cientifico">${item.cientifico}</div>
                        <div class="meta">
                            <span><i class="fas fa-${item.categoria === 'animal' ? 'paw' : 'leaf'}"></i> ${item.grupo}</span>
                            <span><i class="fas fa-tree"></i> ${item.habitat}</span>
                            <span><span class="badge-estado ${item.estado}">${item.estado}</span></span>
                            <span><i class="fas fa-map-marker-alt"></i> ${item.distribucion}</span>
                        </div>
                    </div>`;
                });
                grid.innerHTML = html;
            }

            const detalles = {
                'tremarctos-ornatus': {
                    nombre: 'Oso de anteojos',
                    cientifico: 'Tremarctos ornatus',
                    taxonomia: 'Mammalia, Carnivora, Ursidae',
                    descripcion: 'El oso de anteojos es la única especie de oso nativa de Sudamérica. Habita en bosques nublados y páramos, donde se alimenta de bromelias, frutos y ocasionalmente pequeños vertebrados. Es un excelente trepador y juega un papel clave en la dispersión de semillas.',
                    distribucion: 'Andes desde Venezuela hasta Bolivia, en bosques nublados entre 800 y 3800 m de altitud.',
                    habitat: 'Bosques nublados, páramos y bosques secos montanos.',
                    ecologia: 'Es frugívoro oportunista, dispersa semillas. Sus principales depredadores son el puma y el jaguar.',
                    estado: 'Vulnerable (VU)',
                    amenazas: 'Pérdida de hábitat, cacería furtiva, fragmentación.',
                    conservacion: 'Protegido en varias ANP como el Parque Nacional Huascarán y el Santuario Nacional de Ampay.',
                    referencias: 'UICN, MINAM, listados nacionales'
                }
            };

            function showDetail(slug) {
                const container = document.getElementById('detailContent');
                const info = detalles[slug];
                if (!info) {
                    const sp = todasEspecies.find(e => e.cientifico.toLowerCase().replace(/ /g, '-') === slug);
                    if (sp) {
                        container.innerHTML =
                            `<div style="background:white;border-radius:24px;padding:2rem;box-shadow:0 8px 30px rgba(0,0,0,0.06);">
                            <h1>${sp.nombre}</h1>
                            <div class="cientifico">${sp.cientifico}</div>
                            <div class="meta-tags">
                                <span><i class="fas fa-tag"></i> ${sp.grupo}</span>
                                <span><i class="fas fa-globe"></i> ${sp.distribucion}</span>
                                <span><i class="fas fa-leaf"></i> ${sp.habitat}</span>
                                <span><span class="badge-estado ${sp.estado}">${sp.estado}</span></span>
                            </div>
                            <p style="margin-top:1rem;">Ficha detallada en preparación.</p>
                            <button class="btn-back" onclick="window.location.hash='#datos'">Volver</button>
                        </div>`;
                    } else {
                        container.innerHTML =
                            `<div style="background:white;border-radius:24px;padding:3rem;text-align:center;"><h2>Especie no encontrada</h2><button class="btn-back" onclick="window.location.hash='#datos'">Volver</button></div>`;
                    }
                    return;
                }
                container.innerHTML = `
                    <div class="detail-header">
                        <h1>${info.nombre}</h1>
                        <div class="cientifico">${info.cientifico}</div>
                        <div class="meta-tags">
                            <span><i class="fas fa-tag"></i> ${info.taxonomia}</span>
                            <span><i class="fas fa-globe"></i> ${info.distribucion}</span>
                            <span><i class="fas fa-leaf"></i> ${info.habitat}</span>
                            <span><span class="badge-estado ${info.estado.split(' ')[0]}">${info.estado}</span></span>
                        </div>
                    </div>
                    <div class="detail-body">
                        <div class="main-info">
                            <h2>Descripción</h2><p>${info.descripcion}</p>
                            <h2>Distribución y hábitat</h2><p><strong>Distribución:</strong> ${info.distribucion}</p><p><strong>Hábitat:</strong> ${info.habitat}</p>
                            <h2>Ecología</h2><p>${info.ecologia}</p>
                            <h2>Estado de conservación</h2><p><strong>Estado UICN:</strong> ${info.estado}</p><p>${info.amenazas}</p>
                            <h2>Medidas de conservación</h2><p>${info.conservacion}</p>
                            <div class="ref"><strong>Referencias:</strong> ${info.referencias}</div>
                        </div>
                        <div class="sidebar">
                            <h3>Datos rápidos</h3>
                            <ul>
                                <li><strong>Nombre común:</strong> ${info.nombre}</li>
                                <li><strong>Nombre científico:</strong> ${info.cientifico}</li>
                                <li><strong>Taxonomía:</strong> ${info.taxonomia}</li>
                                <li><strong>Distribución:</strong> ${info.distribucion}</li>
                                <li><strong>Hábitat:</strong> ${info.habitat}</li>
                                <li><strong>Estado:</strong> ${info.estado}</li>
                            </ul>
                        </div>
                    </div>
                `;
            }

            window.navigateToDetail = function(slug) { window.location.hash = 'detalle=' + slug; };
            document.getElementById('backFromDetailBtn').addEventListener('click', function() { window.location.hash =
                    '#datos'; });
            document.getElementById('catFilter').addEventListener('change', renderCatalog);
            document.getElementById('catSearch').addEventListener('input', renderCatalog);
            document.getElementById('catResetBtn').addEventListener('click', function() {
                document.getElementById('catFilter').value = 'todos';
                document.getElementById('catSearch').value = '';
                renderCatalog();
            });

            // =============================================================
            // 6. ÉTICA
            // =============================================================
            const ethicsBtns = document.querySelectorAll('.ethics-options button');
            const feedbackDiv = document.getElementById('ethicsFeedback');
            const feedbackText = document.getElementById('feedbackText');

            ethicsBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    ethicsBtns.forEach(b => b.classList.remove('selected'));
                    this.classList.add('selected');
                    const option = this.dataset.feedback;
                    let message = '';
                    switch (option) {
                        case 'publicar':
                            message = 'Publicar todos los datos acelera la investigación pero expone a las especies a riesgos. Se recomienda un acceso controlado.';
                            break;
                        case 'anonimizar':
                            message = 'Anonimizar y compartir resúmenes es un equilibrio responsable. ¡Buena decisión!';
                            break;
                        case 'restringir':
                            message = 'Restringir el acceso solo a científicos es la opción más conservadora y segura.';
                            break;
                        default:
                            message = 'Opción considerada.';
                    }
                    feedbackText.textContent = message;
                    feedbackDiv.classList.add('show');
                });
            });

            // =============================================================
            // 7. INICIALIZACIÓN GLOBAL
            // =============================================================
            window.todasEspecies = todasEspecies;
            window.renderCatalog = renderCatalog;
            window.populateSpeciesSelect = populateSpeciesSelect;
            window.initMap = initMap;
            window.initENM = initENM;
            window.updateENM = updateENM;

            if (document.getElementById('catalogGrid')) {
                renderCatalog();
            }

        })();
    </script>
</body>
</html>
